[workspace]
name = "go2-gesture-demo"
version = "0.1.0"
description = "Gesture control demo for Unitree Go2"
channels = ["conda-forge"]
platforms = ["linux-64", "win-64", "osx-64", "osx-arm64"]

[dependencies]
python = ">=3.10,<3.12"
pip = "*"

[pypi-dependencies]
opencv-python = ">=4.10,<5"
mediapipe = ">=0.10.14,<0.11"

[tasks]
run = {cmd = "python -m src --interface eth0", env = {PYTHONPATH = "."}}
dry-run = {cmd = "python -m src --dry-run", env = {PYTHONPATH = "."}}
install-unitree-sdk = "python -m pip install git+https://github.com/unitreerobotics/unitree_sdk2_python.git"