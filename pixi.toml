[workspace]
name = "ts-go2-playground"
version = "0.1.0"
description = "Go2 Playground — umbrella monorepo for Go2 gesture control and Robot Bridge foundation"
channels = ["conda-forge"]
platforms = ["linux-64", "win-64", "osx-64", "osx-arm64"]

[dependencies]
python = ">=3.10,<3.12"
pip = "*"

[pypi-dependencies]
go2-gesture-control = { path = "./packages/go2-gesture-control", editable = true }
go2-robot-bridge = { path = "./packages/go2-robot-bridge", editable = true }
go2-bridge-client = { path = "./packages/go2-bridge-client", editable = true }
fastapi = ">=0.138.0, <0.139"
uvicorn = ">=0.49.0, <0.50"
pydantic = ">=2.13.4, <3"

[tasks]
run = {cmd = "python -m go2_gesture_control --interface eth0"}
dry-run = {cmd = "python -m go2_gesture_control --dry-run"}
bridge-server = {cmd = "uvicorn go2_robot_bridge.app:app --host 127.0.0.1 --port 50001"}
bridge-client = {cmd = "python -m go2_bridge_client"}
install-unitree-sdk = "python -m pip install git+https://github.com/unitreerobotics/unitree_sdk2_python.git"
